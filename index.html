<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Portal</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
    }
    .landing {
      text-align: center;
      color: white;
      padding: 40px;
    }
    .landing .logo-big {
      width: 80px; height: 80px;
      background: var(--teal);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin: 0 auto 28px;
    }
    .landing h1 {
      font-family: var(--font-display);
      font-size: 2.8rem;
      margin-bottom: 12px;
    }
    .landing h1 span { color: var(--teal); }
    .landing p {
      color: rgba(255,255,255,0.6);
      margin-bottom: 36px;
      font-size: 1.05rem;
    }
    .landing-btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .btn-teal {
      padding: 14px 32px;
      background: var(--teal);
      color: var(--navy);
      border: none;
      border-radius: 10px;
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-teal:hover { background: var(--teal-dark); transform: translateY(-2px); }
    .btn-outline {
      padding: 14px 32px;
      background: transparent;
      color: white;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 10px;
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-outline:hover { border-color: white; background: rgba(255,255,255,0.05); }
  </style>
</head>
<body>
<div class="landing">
  <div class="logo-big">🏢</div>
  <h1>Employee<br><span>Portal</span></h1>
  <p>Secure, role-based workforce management system</p>
  <div class="landing-btns">
    <a href="pages/login.html" class="btn-teal">Sign In →</a>
    <a href="pages/register.html" class="btn-outline">Create Account</a>
  </div>
</div>
<script src="js/api.js"></script>
<script>
  // If already logged in, redirect to correct dashboard
  if (Auth.isLoggedIn()) {
    const u = Auth.getUser();
    window.location.href = u.role === 'manager'
      ? 'pages/manager-dashboard.html'
      : 'pages/employee-dashboard.html';
  }
</script>
</body>
</html>
